<!DOCTYPE html>
<html>
<head>
    <title>API Endpoint Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
        pre { background: #f8f9fa; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>API Endpoint Testing</h1>
    
    <div class="test">
        <h3>Test 1: Health Check</h3>
        <button onclick="testHealth()">Test Health Endpoint</button>
        <div id="health-result"></div>
    </div>
    
    <div class="test">
        <h3>Test 2: Simple GET</h3>
        <button onclick="testGet()">Test GET /api/v1/quantities</button>
        <div id="get-result"></div>
    </div>
    
    <div class="test">
        <h3>Test 3: Convert Operation</h3>
        <button onclick="testConvert()">Test Convert Operation</button>
        <div id="convert-result"></div>
    </div>
    
    <div class="test">
        <h3>Test 4: Login</h3>
        <button onclick="testLogin()">Test Login</button>
        <div id="login-result"></div>
    </div>
    
    <div class="test">
        <h3>Test 5: Signup</h3>
        <button onclick="testSignup()">Test Signup</button>
        <div id="signup-result"></div>
    </div>

    <script>
        function showResult(elementId, success, message, data = null) {
            const element = document.getElementById(elementId);
            element.className = 'test ' + (success ? 'success' : 'error');
            element.innerHTML = `
                <p><strong>${success ? 'SUCCESS' : 'ERROR'}:</strong> ${message}</p>
                ${data ? `<pre>${JSON.stringify(data, null, 2)}</pre>` : ''}
            `;
        }
        
        function testHealth() {
            fetch('http://localhost:8080/actuator/health')
                .then(response => response.json())
                .then(data => showResult('health-result', true, 'Health check passed', data))
                .catch(error => showResult('health-result', false, `Health check failed: ${error.message}`));
        }
        
        function testGet() {
            fetch('http://localhost:8080/api/v1/quantities')
                .then(response => response.text())
                .then(data => showResult('get-result', true, 'GET request successful', data))
                .catch(error => showResult('get-result', false, `GET request failed: ${error.message}`));
        }
        
        function testConvert() {
            const requestData = {
                input1: {
                    value: 1,
                    unit: "METER"
                },
                input2: null,
                meta: {
                    measurementType: "LengthUnit",
                    operationType: "CONVERT",
                    resultUnit: "CENTIMETERS"
                }
            };
            
            fetch('http://localhost:8080/api/v1/quantities/perform', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestData)
            })
            .then(response => response.json())
            .then(data => showResult('convert-result', true, 'Convert operation successful', data))
            .catch(error => showResult('convert-result', false, `Convert operation failed: ${error.message}`));
        }
        
        function testLogin() {
            const requestData = {
                username: "testuser",
                password: "testpass"
            };
            
            fetch('http://localhost:8080/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestData)
            })
            .then(response => response.text())
            .then(data => showResult('login-result', true, 'Login successful', { token: data }))
            .catch(error => showResult('login-result', false, `Login failed: ${error.message}`));
        }
        
        function testSignup() {
            const requestData = {
                username: "newuser" + Date.now(),
                password: "newpass123",
                email: "newuser@test.com"
            };
            
            fetch('http://localhost:8080/api/v1/quantities/auth/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestData)
            })
            .then(response => response.text())
            .then(data => showResult('signup-result', true, 'Signup successful', { message: data }))
            .catch(error => showResult('signup-result', false, `Signup failed: ${error.message}`));
        }
    </script>
</body>
</html>
