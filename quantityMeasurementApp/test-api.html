<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>Testing API</h1>
    <div id="result"></div>
    
    <script>
        fetch('http://localhost:8080/api/v1/quantities/perform', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                input1: {
                    value: 1,
                    unit: "METER"
                },
                input2: null,
                meta: {
                    measurementType: "LengthUnit",
                    operationType: "CONVERT",
                    resultUnit: "CENTIMETERS"
                }
            })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('result').innerHTML = 'Success: ' + data.value + ' ' + data.unit;
        })
        .catch(error => {
            document.getElementById('result').innerHTML = 'Error: ' + error.message;
        });
    </script>
</body>
</html>
