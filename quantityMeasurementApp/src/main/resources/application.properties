# =======================
# APPLICATION NAME
# =======================
spring.application.name=quantity-measurement-app


# =======================
# MYSQL DATABASE CONFIGURATION
# =======================

spring.datasource.url=jdbc:mysql://localhost:3306/quantity_db
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =======================
# JPA / HIBERNATE CONFIGURATION
# =======================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# =======================
# SWAGGER (OpenAPI) CONFIGURATION
# =======================

springdoc.swagger-ui.path=/quantity-measurement-app


# =======================
# SPRING BOOT ACTUATOR CONFIGURATION
# =======================

management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always


# =======================
# JWT CONFIG
# =======================

jwt.secret=mysecretkeymysecretkeymysecretkey12345
jwt.expiration=86400000


# =======================
# OAUTH2 (GOOGLE LOGIN)
# =======================

spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile